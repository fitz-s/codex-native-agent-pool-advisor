name: Bug report
description: Report a native agent pool advisor issue
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What did Codex report or do?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Redacted evidence
      description: Include redacted hook output, doctor output, or test output. Do not attach private transcripts or state DBs.
  - type: input
    id: version
    attributes:
      label: Advisor version
      placeholder: v0.1.1
